services:
  db:
    image: postgres:16-alpine
    container_name: series_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seriesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seriesdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: postgres:16-alpine
    container_name: series_db_init
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./db/schema.sql:/schema.sql:ro
    command: sh -c "psql -h db -U postgres -d seriesdb -v ON_ERROR_STOP=1 -f /schema.sql"

  api:
    image: python:3.12-slim
    container_name: series_api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./series-api:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./series-api/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/seriesdb
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  postgres_data: