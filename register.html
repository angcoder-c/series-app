<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Series App</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }
        .auth-card {
            background: #1a1a1a;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }
        .auth-card h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .auth-card p {
            color: #888;
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form input {
            border: 1px solid #333;
            border-radius: 8px;
            background: #0f0f0f;
            color: #fff;
            padding: 0.75rem;
            font-size: 1rem;
        }
        .auth-form input:focus {
            outline: none;
            border-color: #666;
        }
        .auth-form button {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .auth-form button:hover {
            opacity: 0.9;
        }
        .auth-link {
            text-align: center;
            margin-top: 1rem;
        }
        .auth-link a {
            color: #0ea5e9;
            text-decoration: none;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        .auth-message {
            text-align: center;
            min-height: 1.2rem;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Series App</h1>
            <p>Crea tu cuenta para empezar</p>
            <form id="signup-form" class="auth-form">
                <input type="email" id="email" name="email" placeholder="Email" required>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
                <input type="password" id="password-confirm" name="password-confirm" placeholder="Confirmar contraseña" required>
                <button type="submit">Registrarse</button>
                <div class="auth-message" id="auth-message"></div>
            </form>
            <div class="auth-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
